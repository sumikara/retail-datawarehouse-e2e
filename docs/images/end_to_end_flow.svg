<svg xmlns="http://www.w3.org/2000/svg" width="3200" height="5200" viewBox="0 0 3200 5200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef3fa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#1f2937" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="8" refY="8" orient="auto-start-reverse">
      <path d="M 0 0 L 16 8 L 0 16 z" fill="#334155"/>
    </marker>
    <style>
      .title { font-family: 'Inter', 'Segoe UI', Arial, sans-serif; font-size: 88px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-family: 'Inter', 'Segoe UI', Arial, sans-serif; font-size: 34px; font-weight: 500; fill: #334155; }
      .boxTitle { font-family: 'Inter', 'Segoe UI', Arial, sans-serif; font-size: 52px; font-weight: 700; fill: #0b1324; }
      .boxText { font-family: 'Inter', 'Segoe UI', Arial, sans-serif; font-size: 34px; fill: #1e293b; }
      .smallText { font-family: 'Inter', 'Segoe UI', Arial, sans-serif; font-size: 30px; fill: #334155; }
      .arrowText { font-family: 'Inter', 'Segoe UI', Arial, sans-serif; font-size: 30px; font-weight: 600; fill: #334155; }
    </style>
  </defs>

  <rect x="0" y="0" width="3200" height="5200" fill="url(#bg)"/>

  <text x="1600" y="130" text-anchor="middle" class="title">Retail Data Warehouse — End-to-End Data Flow</text>
  <text x="1600" y="190" text-anchor="middle" class="subtitle">Source-to-Analytics architecture (Landing → Mapping/Lineage → 3NF → Dimensional → BI)</text>

  <!-- Box 1 -->
  <rect x="260" y="290" rx="36" ry="36" width="2680" height="380" fill="#ffffff" stroke="#1e3a8a" stroke-width="8" filter="url(#shadow)"/>
  <text x="300" y="390" class="boxTitle">[ SOURCE CSV FILES ]</text>
  <text x="300" y="475" class="boxText">• Online and offline transactional extracts in CSV format</text>
  <text x="300" y="535" class="boxText">• Daily/periodic batch arrivals</text>
  <text x="300" y="595" class="boxText">• Raw source boundaries preserved for traceability</text>

  <line x1="1600" y1="690" x2="1600" y2="780" stroke="#334155" stroke-width="10" marker-end="url(#arrow)"/>

  <!-- Box 2 -->
  <rect x="260" y="830" rx="36" ry="36" width="2680" height="680" fill="#ffffff" stroke="#0f766e" stroke-width="8" filter="url(#shadow)"/>
  <text x="300" y="930" class="boxTitle">[ LANDING LAYER — sl_online_retail / sl_offline_retail ]</text>
  <text x="300" y="1020" class="boxText">• Foreign tables via file_fdw for external file access</text>
  <text x="300" y="1080" class="boxText">• Raw ingestion tables: src_*_raw</text>
  <text x="300" y="1140" class="boxText">• Standardized source tables: src_*</text>
  <text x="300" y="1200" class="boxText">• Structural harmonization and type normalization</text>
  <text x="300" y="1260" class="boxText">• Initial data-quality checks and load auditing hooks</text>
  <text x="300" y="1360" class="smallText">Primary objective: Lossless ingestion + canonicalized landing contracts</text>

  <line x1="1600" y1="1530" x2="1600" y2="1620" stroke="#334155" stroke-width="10" marker-end="url(#arrow)"/>

  <!-- Box 3 -->
  <rect x="260" y="1670" rx="36" ry="36" width="2680" height="980" fill="#ffffff" stroke="#7c3aed" stroke-width="8" filter="url(#shadow)"/>
  <text x="300" y="1770" class="boxTitle">[ MAPPING / LINEAGE LAYER — stg schema ]</text>
  <text x="300" y="1860" class="boxText">Entity-by-entity mapping tables:</text>
  <text x="360" y="1920" class="boxText">• mapping_customers</text>
  <text x="360" y="1980" class="boxText">• mapping_products</text>
  <text x="360" y="2040" class="boxText">• mapping_promotions</text>
  <text x="360" y="2100" class="boxText">• mapping_deliveries</text>
  <text x="360" y="2160" class="boxText">• mapping_engagements</text>
  <text x="360" y="2220" class="boxText">• mapping_employees</text>
  <text x="360" y="2280" class="boxText">• mapping_transactions</text>
  <text x="300" y="2360" class="boxText">• Composite surrogate key derivation</text>
  <text x="300" y="2420" class="boxText">• row_sig MD5 deduplication signatures</text>
  <text x="300" y="2480" class="boxText">• ETL control tables: etl_batch_run, etl_step_run, etl_log, etl_file_registry</text>
  <text x="300" y="2580" class="smallText">Primary objective: deterministic lineage and transformation observability</text>

  <line x1="1600" y1="2670" x2="1600" y2="2760" stroke="#334155" stroke-width="10" marker-end="url(#arrow)"/>

  <!-- Box 4 -->
  <rect x="260" y="2810" rx="36" ry="36" width="2680" height="890" fill="#ffffff" stroke="#b45309" stroke-width="8" filter="url(#shadow)"/>
  <text x="300" y="2910" class="boxTitle">[ NORMALIZED LAYER (Inmon) — nf schema ]</text>
  <text x="300" y="3000" class="boxText">3NF Snowflake structure:</text>
  <text x="360" y="3060" class="boxText">• nf_states → nf_cities → nf_addresses</text>
  <text x="360" y="3120" class="boxText">• nf_customers, nf_stores, nf_products</text>
  <text x="360" y="3180" class="boxText">• nf_promotions, nf_deliveries, nf_engagements</text>
  <text x="360" y="3240" class="boxText">• nf_employees_scd (SCD Type 2)</text>
  <text x="360" y="3300" class="boxText">• nf_transactions (integration fact)</text>
  <text x="300" y="3380" class="boxText">• Referential integrity and conformed integration at enterprise grain</text>
  <text x="300" y="3480" class="smallText">Primary objective: stable enterprise truth in normalized model</text>

  <line x1="1600" y1="3720" x2="1600" y2="3810" stroke="#334155" stroke-width="10" marker-end="url(#arrow)"/>

  <!-- Box 5 -->
  <rect x="260" y="3860" rx="36" ry="36" width="2680" height="760" fill="#ffffff" stroke="#be123c" stroke-width="8" filter="url(#shadow)"/>
  <text x="300" y="3960" class="boxTitle">[ DIMENSIONAL LAYER (Kimball) — dim schema ]</text>
  <text x="300" y="4050" class="boxText">Star schema dimensions:</text>
  <text x="360" y="4110" class="boxText">• dim_customers, dim_stores, dim_products, dim_promotions</text>
  <text x="360" y="4170" class="boxText">• dim_deliveries, dim_engagements, dim_employees_scd, dim_dates</text>
  <text x="300" y="4250" class="boxText">Fact model:</text>
  <text x="360" y="4310" class="boxText">• fct_transactions_dd_dd (partitioned fact table)</text>
  <text x="300" y="4390" class="boxText">• Analytics-first denormalization for BI query performance</text>
  <text x="300" y="4490" class="smallText">Primary objective: fast slicing, dicing, and KPI-ready reporting mart</text>

  <line x1="1600" y1="4640" x2="1600" y2="4730" stroke="#334155" stroke-width="10" marker-end="url(#arrow)"/>

  <!-- Box 6 -->
  <rect x="260" y="4780" rx="36" ry="36" width="2680" height="300" fill="#ffffff" stroke="#0f766e" stroke-width="8" filter="url(#shadow)"/>
  <text x="300" y="4880" class="boxTitle">[ ANALYTICS LAYER — planned ]</text>
  <text x="300" y="4970" class="boxText">• Power BI Dashboard · KPI reporting · Data Quality dashboards</text>

</svg>
